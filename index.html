      <!-- FAQ Section -->
      <section id="faq" class="faq-section">
        <div class="container">
          <h2 class="section-title text-center">Frequently Asked Questions</h2>
          <p class="section-subtitle text-center">Have questions? We've got answers.</p>
          
          <div class="faq-list">
            <div class="faq-item glass">
              <button class="faq-trigger" onclick="toggleFaq(this)">
                <span>How does the AI customize my workouts?</span>
                <i data-lucide="chevron-down"></i>
              </button>
              <div class="faq-content">
                <p>FitGenie looks at your available equipment (e.g. dumbbells, barbell, bands, or bodyweight), goals, current level, active pain points, schedule, and duration preference to compute optimal periodization structures, specific exercises, sets, reps, and target heart-rate zones.</p>
              </div>
            </div>
            
            <div class="faq-item glass">
              <button class="faq-trigger" onclick="toggleFaq(this)">
                <span>What if I have an injury or joint pain?</span>
                <i data-lucide="chevron-down"></i>
              </button>
              <div class="faq-content">
                <p>You can tap on the Injury Management dashboard and click on any joint or muscle region. FitGenie recalculates your weekly plans immediately, swapping compound loaded lifts with knee/shoulder/elbow friendly recovery patterns and adding joint mobilization guides.</p>
              </div>
            </div>

            <div class="faq-item glass">
              <button class="faq-trigger" onclick="toggleFaq(this)">
                <span>Can I replace recipes I don't like?</span>
                <i data-lucide="chevron-down"></i>
              </button>
              <div class="faq-content">
                <p>Absolutely. In the Nutrition view, clicking "Replace Meal" tells FitGenie to generate alternate recipes conforming exactly to your allergies, macros target, and cooking style. It updates your shopping list automatically.</p>
              </div>
            </div>

            <div class="faq-item glass">
              <button class="faq-trigger" onclick="toggleFaq(this)">
                <span>Is my information secure?</span>
                <i data-lucide="chevron-down"></i>
              </button>
              <div class="faq-content">
                <p>Yes. In this browser setup, your metrics are saved safely in your own browser's local sandbox storage. We do not sell or track your private biometric records.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

                    <div class="rep-stat-box">
                      <h5>Calorie Accuracy</h5>
                      <p id="rep-accuracy">94.2%</p>
                    </div>
                    <div class="rep-stat-box">
                      <h5>Active Strain Mode</h5>
                      <p id="rep-strain">Normal / Injury Adaptive</p>
                    </div>
                  </div>
                  
                  <h4 class="mt-4">Advisor Assessment & Next Steps</h4>
                  <p id="rep-advisor-content" class="advisor-narrative">
                    "Excellent adherence this cycle. Your daily hydration metrics averaged 2.8L, showing a positive trend. Based on your current 12-week math projection, you are on track to achieve your goal. Weekly muscle fatigue registers normal. Ensure active rest on off days."
                  </p>
                </div>
                <div class="report-footer border-top mt-6">
                  <p>Computed by FitGenie AI System | Capstone Prototype Edition</p>
                  <button class="btn btn-primary btn-sm mt-3" onclick="window.print()"><i data-lucide="printer"></i> Print / Save PDF</button>
                </div>
              </div>
            </div>
          </div>

          <!-- VIEW: Achievements -->
          <div id="view-achievements" class="app-view">
            <div class="streak-banner-card glass hover-glow">
              <div class="banner-content">
                <i data-lucide="flame" class="streak-icon-large animate-bounce"></i>
                <div>
                  <h2 id="achieve-streak-title" class="font-header">3 Day Streak</h2>
                  <p>Log your food, hydrate, and start workouts daily to build consistent milestones!</p>
                </div>
              </div>
            </div>

            <!-- Badges Gallery -->
            <div class="badges-grid-container mt-6" id="badges-container">
              <!-- Loaded dynamically via JS -->
            </div>
          </div>

          <!-- VIEW: User Profile & Settings -->
          <div id="view-profile" class="app-view">
            <div class="profile-layout-grid">
              <!-- Left card: Bio -->
              <div class="panel-card glass hover-glow">
                <div class="panel-header border-bottom">
                  <h3>Edit Profile Details</h3>
                </div>
                <div class="panel-body">
                  
                  <!-- Profile Avatar Section -->
                  <div class="flex items-center gap-4 mb-6">
                    <div class="user-avatar" id="profile-avatar-large" style="width: 5rem; height: 5rem; font-size: 1.85rem;">AM</div>
                    <div>
                      <button class="btn btn-outline btn-sm glass" onclick="document.getElementById('avatar-upload-file').click()"><i data-lucide="upload"></i> Upload Photo</button>
                      <input type="file" id="avatar-upload-file" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                      <p class="small-label mt-1">PNG, JPG (Max 2MB)</p>
                    </div>
                  </div>

                  <form id="form-profile-edit" onsubmit="handleProfileEdit(event)">
                    <div class="inputs-grid">
                      <!-- Name Floating Input -->
                      <div class="input-floating-group icon-left mt-2">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="prof-name" required placeholder=" ">
                        <label for="prof-name">Name</label>
                        <span class="floating-focus-line"></span>
                      </div>

                      <!-- Age Floating Input -->
                      <div class="input-floating-group icon-left mt-4">
                        <i data-lucide="calendar" class="input-icon"></i>
                        <input type="number" id="prof-age" min="12" max="100" required placeholder=" ">
                        <label for="prof-age">Age</label>
                        <span class="floating-focus-line"></span>
                      </div>

                      <!-- Height Floating Input -->
                      <div class="input-floating-group icon-left mt-4">
                        <i data-lucide="ruler" class="input-icon"></i>
                        <input type="number" id="prof-height" min="100" max="250" required placeholder=" ">
                        <label for="prof-height">Height (cm)</label>
                        <span class="floating-focus-line"></span>
                      </div>

                      <!-- Weight Floating Input -->
                      <div class="input-floating-group icon-left mt-4">
                        <i data-lucide="scale" class="input-icon"></i>
                        <input type="number" id="prof-weight" min="30" max="250" step="0.1" required placeholder=" ">
                        <label for="prof-weight">Weight (kg)</label>
                        <span class="floating-focus-line"></span>
                      </div>
                      
                      <!-- Custom Searchable Goal Selector Dropdown -->
                      <div class="input-group mt-4">
                        <label class="field-section-label">Primary Goal</label>
                        <div class="custom-select-wrapper" id="select-prof-goal" data-value="Build Muscle">
                          <div class="custom-select-trigger" onclick="toggleCustomSelect('select-prof-goal', event)">
                            <span class="selected-text">Build Muscle & Strength</span>
                            <i data-lucide="chevron-down"></i>
                          </div>
                          <div class="custom-select-options hidden" onclick="event.stopPropagation()">
                            <div class="select-search-box">
                              <i data-lucide="search"></i>
                              <input type="text" placeholder="Search goals..." oninput="filterCustomSelect('select-prof-goal', this.value)">
                            </div>
                            <div class="options-list">
                              <div class="select-option selected" data-value="Build Muscle" onclick="selectCustomOption('select-prof-goal', 'Build Muscle', 'Build Muscle & Strength')">Build Muscle & Strength</div>
                              <div class="select-option" data-value="Lose Weight" onclick="selectCustomOption('select-prof-goal', 'Lose Weight', 'Lose Weight & Fat')">Lose Weight & Fat</div>
                              <div class="select-option" data-value="Maintain" onclick="selectCustomOption('select-prof-goal', 'Maintain', 'Maintain Fitness & Tone')">Maintain Fitness & Tone</div>
                              <div class="select-option" data-value="Athletic Performance" onclick="selectCustomOption('select-prof-goal', 'Athletic Performance', 'Athletic Performance')">Athletic Performance</div>
                            </div>
                          </div>
                        </div>
                        <input type="hidden" id="prof-goal" value="Build Muscle" required>
                      </div>
                      
                      <!-- Custom Searchable Diet Selector Dropdown -->
                      <div class="input-group mt-4">
                        <label class="field-section-label">Diet Preference</label>
                        <div class="custom-select-wrapper" id="select-prof-diet" data-value="Standard/Balanced">
                          <div class="custom-select-trigger" onclick="toggleCustomSelect('select-prof-diet', event)">
                            <span class="selected-text">Standard / Balanced</span>
                            <i data-lucide="chevron-down"></i>
                          </div>
                          <div class="custom-select-options hidden" onclick="event.stopPropagation()">
                            <div class="select-search-box">
                              <i data-lucide="search"></i>
                              <input type="text" placeholder="Search diets..." oninput="filterCustomSelect('select-prof-diet', this.value)">
                            </div>
                            <div class="options-list">
                              <div class="select-option selected" data-value="Standard/Balanced" onclick="selectCustomOption('select-prof-diet', 'Standard/Balanced', 'Standard / Balanced')">Standard / Balanced</div>
                              <div class="select-option" data-value="High Protein" onclick="selectCustomOption('select-prof-diet', 'High Protein', 'High Protein')">High Protein</div>
                              <div class="select-option" data-value="Keto/Low Carb" onclick="selectCustomOption('select-prof-diet', 'Keto/Low Carb', 'Keto / Low Carb')">Keto / Low Carb</div>
                              <div class="select-option" data-value="Vegetarian" onclick="selectCustomOption('select-prof-diet', 'Vegetarian', 'Vegetarian')">Vegetarian</div>
                              <div class="select-option" data-value="Vegan" onclick="selectCustomOption('select-prof-diet', 'Vegan', 'Vegan')">Vegan</div>
                              <div class="select-option" data-value="Mediterranean" onclick="selectCustomOption('select-prof-diet', 'Mediterranean', 'Mediterranean')">Mediterranean</div>
                            </div>
                          </div>
                        </div>
                        <input type="hidden" id="prof-diet" value="Standard/Balanced" required>
                      </div>
                    </div>
                    
                    <div class="flex gap-3 mt-6">
                      <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                      <button type="button" class="btn btn-outline glass btn-lg" onclick="cancelProfileChanges()">Cancel</button>
                      <button type="button" class="btn btn-outline glass btn-lg" onclick="exportProfileData()"><i data-lucide="download"></i> Export JSON</button>
                    </div>
                  </form>
                </div>
              </div>

              <!-- Right card: System Preferences -->
              <div class="panel-card glass hover-glow">
                <div class="panel-header border-bottom">
                  <h3>App Settings</h3>
                </div>
                <div class="panel-body flex flex-column gap-4">
                  <div class="settings-toggle-row">
                    <div>
                      <h4>Dark Mode</h4>
                      <p class="small-label">Switch layout stylesheet to dark accenting</p>
                    </div>
                    <label class="switch">
                      <input type="checkbox" id="settings-dark-mode-chk" onchange="toggleTheme()">
                      <span class="slider round"></span>
                    </label>
                  </div>

                  <div class="settings-toggle-row">
                    <div>
                      <h4>Metric Units (kg, cm, L)</h4>
                      <p class="small-label">Use metric calculations instead of imperial systems</p>
                    </div>
                    <label class="switch">
                      <input type="checkbox" checked disabled>
                      <span class="slider round"></span>
                    </label>
                  </div>

                  <div class="settings-toggle-row border-top pt-4">
                    <div>
                      <h4 class="danger-text">Clear Sandbox Database</h4>
                      <p class="small-label">Warning: This deletes all logged logs, onboarding data, active profiles, and resets streak logs.</p>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="clearSystemData()">Delete Data</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>

    <!-- Floating AI Quick Assistant Modal Popup -->
    <div id="quick-coach-modal" class="quick-coach-modal glass hidden" onclick="event.stopPropagation()">
      <div class="quick-coach-header">
        <div class="flex items-center gap-2">
          <div class="mini-coach-avatar"><i data-lucide="wand-2"></i></div>
          <h4>Quick Genie Assistant</h4>
        </div>
        <button class="btn-text btn-sm" onclick="toggleQuickCoachModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="quick-coach-body" id="quick-coach-chat-history">
        <div class="chat-bubble bot"><p>Hi! Ask a quick question about macros, rest swaps, or weight forecasts.</p></div>
      </div>
      <div class="quick-coach-footer">
        <input type="text" id="quick-coach-input" placeholder="Type query here..." onkeydown="handleQuickCoachKeyDown(event)">
        <button class="btn btn-primary btn-sm" onclick="sendQuickCoachMessage()"><i data-lucide="send"></i></button>
      </div>
    </div>

    <!-- AI Coach Floating Toggle (Active only on app screens) -->
    <div id="ai-coach-bubble" class="ai-coach-bubble hidden" onclick="toggleQuickCoachModal(event)">
      <i data-lucide="wand-2"></i>
      <span class="bubble-ping"></span>
    </div>

    <!-- Global Command Palette Modal -->
    <div id="command-palette-modal" class="modal-overlay hidden" onclick="closeCommandPalette(event)">
      <div class="command-palette-card glass" onclick="event.stopPropagation()">
        <div class="command-search-header">
          <i data-lucide="search"></i>
          <input type="text" id="command-palette-input" placeholder="Type a feature, goal, or command (e.g. 'Log Water', 'Go to Analytics')..." oninput="filterCommandPalette()">
          <span class="esc-badge"><kbd>ESC</kbd></span>
        </div>
        <div class="command-list-container" id="command-palette-results">
          <!-- Populated dynamically by app.js -->
        </div>
      </div>
    </div>
  </template>

  <!-- App Core Logic -->
  <script src="app.js"></script>
</body>
</html>
